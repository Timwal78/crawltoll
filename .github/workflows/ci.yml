name: ci
on: [push, pull_request]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@cdca7d6dd16c72fb5d9c5b2d47aaddfca8fd94e2 # v4
        with:
          node-version: 20
      - run: npm install --ignore-scripts
      - run: npm audit --audit-level=high || true
      - run: npm run lint || true
      - name: Unit tests (AP2 mandate verification)
        run: node test/ap2.test.js
      - name: Smoke tests (middleware integration)
        run: node test/smoke.js
