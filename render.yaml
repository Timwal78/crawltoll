services:
  - type: web
    name: crawltoll
    runtime: node
    plan: starter
    buildCommand: "npm install --omit=dev || true"
    startCommand: "node server.js"
    envVars:
      # CRAWLTOLL_PAYTO must be set as a secret in the Render dashboard.
      # It must be a valid EVM 0x address (your USDC recipient wallet).
      # Never hardcode wallet addresses here — use Render secret env vars.
      - key: CRAWLTOLL_PAYTO
        sync: false   # Set this in Render dashboard as a secret
      - key: CRAWLTOLL_NETWORK
        value: "base"
      - key: CRAWLTOLL_PRICE
        value: "0.005"
      # Admin secret for /crawltoll/stats and /crawltoll/visitors — set as a Render secret.
      - key: CRAWLTOLL_ADMIN_SECRET
        sync: false   # Set this in Render dashboard as a secret
      # VAPL soul file — use a persistent disk path in production.
      - key: VAPL_SOUL_FILE
        value: "/var/data/vapl_soul_crawltoll.json"
